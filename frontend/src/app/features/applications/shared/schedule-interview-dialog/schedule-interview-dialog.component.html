<h2 mat-dialog-title>Planifier un entretien</h2>
<mat-dialog-content>
  <p>{{ data.candidateName }}</p>

  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date et heure</mat-label>
      <input matInput type="datetime-local" formControlName="scheduled_at">
      <mat-error>Date et heure requises.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Lieu</mat-label>
      <input matInput formControlName="location">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Lien visio</mat-label>
      <input matInput formControlName="meeting_link">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput rows="3" formControlName="notes"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Annuler</button>
  <button mat-flat-button color="primary" type="button" (click)="submit()">Planifier</button>
</mat-dialog-actions>
