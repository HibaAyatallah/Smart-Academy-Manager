<h2 mat-dialog-title>Refuser la candidature</h2>
<mat-dialog-content>
  <p>{{ data.candidateName }}</p>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Motif du refus</mat-label>
      <textarea matInput rows="4" formControlName="reason"></textarea>
      <mat-error>Motif requis.</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Annuler</button>
  <button mat-flat-button color="warn" type="button" (click)="submit()">Confirmer le refus</button>
</mat-dialog-actions>
